<form id="productForm" class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="...">Nome do Produto</label>
            <input type="text" id="prodName" required class="...">
        </div>
        <div>
            <label class="...">Código Identificador (SKU)</label>
            <input type="text" id="prodSku" required class="...">
        </div>
        <div>
            <label class="...">Preço do Produto (R$)</label>
            <input type="number" step="0.01" id="prodPrice" required class="...">
        </div>
        <div>
            <label class="...">Categoria de Destino</label>
            <select id="prodCategory" class="...">
                <option>Camisetas</option>
                <option>Kits B7Web</option>
                <option>Acessórios</option>
                <option>Eletrônicos</option>
            </select>
        </div>
    </div>
    <div>
        <label class="...">Descrição Comercial</label>
        <textarea rows="4" id="prodDescription" required class="..."></textarea>
    </div>
    <div class="flex justify-end space-x-3 pt-6 border-t">
        <button type="button" class="...">Cancelar</button>
        <button type="submit" class="...">Salvar e Publicar</button>
    </div>
</form>

<script>
// Proteção de rota no Frontend: Se não tiver token, volta pro login
if (!localStorage.getItem('token')) {
    alert('Acesso restrito. Por favor, faça login.');
    window.location.href = 'login.html';
}

document.getElementById('productForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const productData = {
        name: document.getElementById('prodName').value,
        sku: document.getElementById('prodSku').value,
        price: parseFloat(document.getElementById('prodPrice').value),
        category: document.getElementById('prodCategory').value,
        description: document.getElementById('prodDescription').value
    };

    const token = localStorage.getItem('token');

    try {
        const response = await fetch('http://localhost:3000/api/products', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` // Envia o token de segurança
            },
            body: JSON.stringify(productData)
        });

        const data = await response.json();

        if (response.ok) {
            alert('Produto cadastrado com sucesso no banco de dados!');
            document.getElementById('productForm').reset();
        } else {
            alert(data.error || 'Erro ao cadastrar produto.');
        }
    } catch (err) {
        alert('Erro ao conectar com o backend.');
    }
});
</script>
