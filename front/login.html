<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-gray-50">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B7Store - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="h-full flex items-center justify-center px-4 sm:px-6 lg:px-8 m-0">
    <div class="max-w-md w-full space-y-6 bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
        
        <div class="text-center">
            <a href="index.html" class="inline-block w-36 mb-4">
                <img src="assets/images/ui/logo-black.png" alt="B7Store" class="w-full" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
                <span class="hidden text-2xl font-black tracking-wider text-black">B7STORE</span>
            </a>
            <h2 class="text-xl font-bold text-gray-900">Acesse sua conta corporativa</h2>
            <p class="text-xs text-gray-400 mt-1">Insira suas credenciais administrativas para gerenciar o catálogo</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">E-mail</label>
                <input id="email" name="email" type="email" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-black focus:bg-white transition" placeholder="admin@b7store.com">
            </div>
            <div>
                <label for="password" class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1">Senha</label>
                <input id="password" name="password" type="password" required class="w-full bg-gray-50 border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-black focus:bg-white transition" placeholder="••••••••">
            </div>

            <div class="flex items-center justify-between text-xs pt-1">
                <label class="flex items-center space-x-2 cursor-pointer font-medium text-gray-600">
                    <input type="checkbox" class="rounded border-gray-300 text-black focus:ring-black" />
                    <span>Lembrar credenciais</span>
                </label>
                <a href="#" class="font-bold text-gray-900 hover:underline">Esqueceu a senha?</a>
            </div>

            <button type="submit" class="w-full bg-black hover:bg-gray-800 text-white font-bold py-3 rounded-xl transition text-center text-sm shadow-md shadow-black/5 mt-2">
                Entrar no Painel
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guarda o token de segurança no navegador
                    localStorage.setItem('token', data.token);
                    alert('Login efetuado com sucesso!');
                    window.location.href = 'cadastro-produto.html'; // Redireciona para a tela de cadastro
                } else {
                    alert(data.error || 'Erro ao efetuar login.');
                }
            } catch (err) {
                alert('Não foi possível conectar ao servidor backend. Certifique-se de que o servidor Node está ativo na porta 3000.');
            }
        });
    </script>
</body>

</html>
